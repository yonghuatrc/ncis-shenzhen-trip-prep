name: Update README file list

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate file list in README
        run: python3 .github/scripts/gen-readme-list.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes to README"
          else
            git config user.name "pages-bot"
            git config user.email "pages-bot@users.noreply.github.com"
            git add README.md
            git commit -m "Auto-update file list"
            git push
          fi
