Bay and Talent Park route reference", "shekou-market-coastal-night-route.webp": "Boss-provided · Shekou Market and coastal night-view route reference"};
let lang='zh';
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function amap(q){const p=new URLSearchParams({keyword:q,city:'深圳',view:'map',src:'shenzhen-trip-2026',callnative:'1'});return 'https://uri.amap.com/search?'+p.toString()}
function text(obj,key){return obj[key+'_'+lang]??obj[key+'_zh']??''}
function routeMapFigure(obj,extraClass=''){
 if(!obj.route_map)return '';
 const caption=lang==='zh'?obj.route_map_caption_zh:obj.route_map_caption_en;
 const alt=lang==='zh'?obj.route_map_alt_zh:obj.route_map_alt_en;
 return `<figure class="route-map ${esc(extraClass)}"><a href="${esc(obj.route_map)}" target="_blank" rel="noopener" aria-label="${esc(caption)}"><img src="${esc(obj.route_map)}" width="${esc(obj.route_map_width)}" height="${esc(obj.route_map_height)}" alt="${esc(alt)}" loading="lazy" decoding="async"></a><figcaption><span>${esc(caption)}</span><span>${esc(CREDIT[obj.route_map.split('/').pop()]||'Itinerary source')}</span></figcaption></figure>`;
}
function render(){
 document.documentElement.lang=lang==='zh'?'zh-CN':'en';
 document.title=lang==='zh'?'深圳 Study Trip＋自由行｜19–26 Jul 2026':'Shenzhen Study Trip + Personal Adventure | 19–26 Jul 2026';
 heroTitle.textContent=lang==='zh'?TRIP.meta.title_zh:TRIP.meta.title_en;
 heroTagline.textContent=lang==='zh'?TRIP.meta.tagline_zh:TRIP.meta.tagline_en;
 introTitle.textContent=lang==='zh'?'八天，一条不断发光的路线。':'Eight days. One route that keeps glowing.';
 introText.textContent=lang==='zh'?TRIP.meta.source_note_zh:TRIP.meta.source_note_en;
 footerText.textContent=lang==='zh'?'出发前请复查天气、营业状态与主办方安排。':'Recheck weather, opening status and hosted arrangements before setting out.';
 const label={weather:lang==='zh'?'天气':'Weather',pack:lang==='zh'?'随身':'Carry',steps:lang==='zh'?'步行':'Walking',risk:lang==='zh'?'风险':'Risk',map:lang==='zh'?'打开高德地图':'Open in AMAP',fallback:lang==='zh'?'备选方案':'Fallback'};
 days.innerHTML=TRIP.days.map((d,idx)=>{
  const items=d.items.map(item=>{
   const body=lang==='zh'?item.zh:item.en;
   const map=item.map?`<a class="maplink" href="${amap(item.map)}" target="_blank" rel="noopener">⌖ ${label.map}</a>`:'';
   const photo=item.image?`<figure class="photo"><img class="${item.fit==='contain'?'contain':''}" src="${esc(item.image)}" alt="${esc(body)}" loading="lazy"><figcaption>${esc(CREDIT[item.image.split('/').pop()]||'Itinerary source')}</figcaption></figure>`:'';
   const droneNote=item.drone_note_zh?`<aside class="drone-note"><strong>${lang==='zh'?'美团无人机外卖':'Meituan drone delivery'} · </strong>${esc(lang==='zh'?item.drone_note_zh:item.drone_note_en)}${item.drone_source_url?`<br><a href="${esc(item.drone_source_url)}" target="_blank" rel="noopener">${esc(lang==='zh'?item.drone_source_label_zh:item.drone_source_label_en)} ↗</a>`:''}</aside>`:'';
   const itemRouteMap=routeMapFigure(item,'inline-route-map');
   return `<article class="stop ${esc(item.kind)}"><div class="time">${esc(item.time)}</div><div class="stop-body"><h3>${esc(body)}</h3>${map}${droneNote}${photo}${itemRouteMap}</div></article>`;
  }).join('');
  const routeMap=routeMapFigure(d);
  return `<section class="day" id="${esc(d.id)}"><header class="day-head"><div class="datebox"><div>DAY <span>${idx+1}</span></div></div><div><div class="eyebrow">${esc(d.date)} · ${esc(lang==='zh'?d.weekday_zh:d.weekday_en)}</div><h2>${esc(text(d,'theme'))}</h2><div class="weather">${esc(text(d,'weather'))}</div></div></header><div class="day-strip"><div class="stat"><b>${label.weather}</b><span>${esc(text(d,'weather'))}</span></div><div class="stat"><b>${label.pack}</b><span>${esc(text(d,'pack'))}</span></div><div class="stat"><b>${label.steps}</b><span>${esc(d.steps)}</span></div><div class="stat"><b>${label.risk}</b><span>${esc(text(d,'risk'))}</span></div></div>${routeMap}<div class="timeline">${items}</div><div class="warning"><strong>${label.fallback} · </strong>${esc(text(d,'fallback'))}</div></section>`;
 }).join('');
 navPanel.innerHTML=TRIP.days.map((d,i)=>`<a href="#${d.id}"><span>${lang==='zh'?'第'+(i+1)+'天':'Day '+(i+1)}</span><b>${d.date}</b></a>`).join('')+`<a href="#top"><span>${lang==='zh'?'回到顶部':'Back to top'}</span><b>↑</b></a>`;
 document.querySelectorAll('#langToggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
}
function setLang(next){lang=next==='en'?'en':'zh';localStorage.setItem('shenzhen-personal-trip-lang',lang);render()}
document.querySelectorAll('#langToggle button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
navPanel.addEventListener('click',e=>{if(e.target.closest('a'))visitNav.open=false});
setLang(new URLSearchParams(location.search).get('lang')||localStorage.getItem('shenzhen-personal-trip-lang')||'zh');
</script>
